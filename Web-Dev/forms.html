<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>

<body>
    <h1>FORMS</h1>
    <div>
        <form action="Welcomepage.html" target="_blank">
            <label for="Email">Email: </label>

            <input type="email" placeholder="Email" id="Email">

            <br>
            <br>

            <label for="Password">Password: </label>
            <input type="password" placeholder="Password" id="Password">

            <br><br>
            <label for="checkbox">Remember me: </label>
            <input type="checkbox" id="checkbox">

            <br><br>
            <label for="phonenumber">Contact : </label>
            <input type="number" id="phonenumber" placeholder="Enter your phone No." min="0">

            <br><br>
            <label for="male">Gender: </label>
            <label for="male">Male </label>
            <input type="radio" id="male" name="gender">
            <label for="genderf">Female </label>
            <input type="radio" id="genderf" name="gender">

            <br><br>
            <label for="DOB">Date Of Birth : </label>
            <input type="date" id="DOB">

            <br><br>
            <label for="FILE">Upload Photo : </label>
            <input type="file" id="FILE">
            <br>
            <br>

            <label for="Drop"> Select Your City : </label>

            <select name="" id="Drop">
                <option value="">Delhi</option>
                <option value="">Mumbai</option>
                <option value="">Kolkata</option>
                <option value="">Jamshedpur</option>
                <option value="">Howrah</option>
                <option value="">Lucknow</option>
                <option value="">Patna</option>
                <option value="">Shimla</option>
                <option value="">Chandigarh</option>
                <option value="">Chennai</option>
            </select>

            <br>
            <br>

            <button type="submit" style="margin-left: 50px;"> SUBMIT FORM </button>

        </form>
    </div>
</body>

</html>
