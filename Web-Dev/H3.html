<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pete's Pizza Delivery</title>
</head>

<body style="background-color: antiquewhite;">
    <div>
        <h1 style="text-align: center;"><strong>Pete's Pizza Delivery</strong></h1>
    </div>
    <h2 style="text-align: center;"><strong>Online Order Form</strong></h2>
    <p style="text-align: center;">* required fileds</p>
    <form action="Welcomepage.html" target="_blank" style="margin-left: 600px;";>
        <fieldset style="width: 670px;">
            <legend>Customer details</legend>
            <label for="Name">*Name: </label>
            <input type="text" id="Name" required placeholder="Enter your Name"
                style="padding-right: 135px;margin-left: 50px;">
            <br>
            <br>
            <label for="Address">*Address: </label>
            <input type="text" id="Address" required placeholder="Enter your Address"
                style="margin-left: 36px; padding-right: 250px;">
            <br>
            <br>
            <label for="Town/city">*Town/city: </label>
            <input type="text" id="Town/city" required placeholder="Enter your Town/city"
                style="margin-left: 25px; padding-right: 35px ;">
            <br>
            <br>
            <label for="Postcode">*Postcode: </label>
            <input type="number" id="Postcode" min="0" required style="margin-left: 33px;"
                placeholder="Enter your Pincode">
            <br>
            <br>
            <label for="Tel">*Tel: </label>
            <input type="number" id="Tel" min="0" required style="margin-left: 70px; padding-right: 35px;"
                placeholder="Phone No.">
            <br>
            <br>
            <label for="Email">*Email: </label>
            <input type="email" id="Email" required style="margin-left: 53px; padding-right: 250px;"
                placeholder="Enter your Email Address">
            <br>
            <br>
            <br>
        </fieldset>
        <br>
        <fieldset style="width: 200px; display: inline-block;">
            <legend>
                Topping *
            </legend>
            <input type="radio" id="Margherita" name="topping" required>
            <label for="Margherita"> Margherita</label>
            <br>
            <input type="radio" id="Four" name="topping" required>
            <label for="Four"> Four Seasons</label>
            <br>
            <input type="radio" id="Meat" name="topping" required>
            <label for="Meat"> Meat Feast</label>
            <br>
            <br>
        </fieldset>
        <fieldset style="width: 200px; display: inline-block;">
            <legend>
                Size *
            </legend>
            <input type="radio" id="small" name="Size" required>
            <label for="small"> Small</label>
            <br>
            <input type="radio" id="medium" name="Size" required>
            <label for="medium"> Medium</label>
            <br>
            <input type="radio" id="large" name="Size" required>
            <label for="large"> Large</label>
            <br>
            <br>
        </fieldset>
        <fieldset style="display: inline-block; width: 200px;">
            <legend>
                Extras
            </legend>
            <input type="checkbox" id="Mushrooms">
            <label for="Mushrooms">Mushrooms</label>
            <br>
            <input type="checkbox" id="Green">
            <label for="Green">Green peppers</label>
            <br>
            <input type="checkbox" id="Anchovies">
            <label for="Anchovies">Anchovies</label>
            <br>
            <input type="checkbox" id="extra">
            <label for="extra">Extra cheese</label>
        </fieldset>
        <br>
        <br>
        <fieldset style="width: 670px;">
            <legend>
                Delivery
            </legend>
            <label for="time">Preferred delivery time: </label>
            <input type="time" id="time" required>
            <br>
            <br>
            <label for="instructions">Delivery instructions: </label>
            <br>
            <br>
            <textarea style="padding-right: 500px; padding-bottom: 100px;" maxlength="100"></textarea>
        </fieldset>
        <br>
        <button type="submit" style="margin-left: 300px;"> Submit order </button>
        <br>
        <br>
    </form>



</body>

</html>
