<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Details Form</title>
</head>
<body>
    <div>
        <h2> <mark>HW 1 FORMS</mark> </h2>
        <form action="Welcomepage.html" target="_blank">
            <fieldset>
                <legend>Employee details</legend>
            <br>
            <label for="FirstName">First Name: </label>
            <input type="text" id="FirstName" placeholder="Enter your First Name" required>
            <br>
            <br>
            <label for="LastName">Last Name: </label>
            <input type="text" id="LastName" placeholder="Enter your Last Name (OPTIONAL)">
            <br>
            <br>
            <input type="radio" id="Male" name="Gender" required>
            <label for="Male">Male</label>
            <input type="radio" id="Female" name="Gender" required>
            <label for="Female">Female</label>
            <br>
            <br>
            <label for="ID">Employee ID: </label>
            <input type="text" id="ID" placeholder="Enter your Employee ID" required>
            <br>
            <br>
            <label for="Designation">Designation: </label>
            <input type="text" id="Designation" placeholder="Enter your Designation" required>
            <br>
            <br>
            <label for="Phone">Phone Number: </label>
            <input type="number" id="Phone" placeholder="Enter your Phone Number" min="0" required>
            <br>
            <br>
            <a href="Terms.html" target="_blank"> Terms & Conditions </a>
            <br>
            <br>
            <input type="checkbox" id="Check" required>
            <label for="Check">I have read the terms & conditions & I accept them and want to proceed.</label>
            <br>
            <br>
            <button type="submit"> Submit </button>
        </fieldset>


        </form>
    </div>
    
</body>
</html>
